---
name: Create SVG header files from README

on:
  push:
    paths:
      - 'README.md'

jobs:
  generate-headers:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Generate Headers
        run: node generate-headers.js

      - name: Commit changes
        run: |
          # Assign user: GitHub Actions [bot]
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "auto: create SVG header files from README" || echo "No changes"
          git push
